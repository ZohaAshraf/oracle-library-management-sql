<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library Management System — Demo</title>
<style>
  body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    color: white;
    text-align: center;
    padding: 40px;
  }

  h1 {
    font-size: 40px;
  }

  .card {
    background: #2f2f4f;
    border-radius: 12px;
    padding: 20px;
    margin: 20px auto;
    width: 80%;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
  }

  button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    background: #6c5ce7;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #a29bfe;
  }

  pre {
    background: #1e1e2f;
    padding: 15px;
    border-radius: 8px;
    text-align: left;
    overflow-x: auto;
  }
</style>
</head>

<body>

<h1>📚 Library Management System</h1>
<p>Interactive SQL Demo</p>

<div class="card">
  <h2>Run Sample Query</h2>
  <button onclick="runQuery('available')">Available Books</button>
  <button onclick="runQuery('borrowed')">Borrowed Books</button>
  <button onclick="runQuery('stats')">Monthly Stats</button>

  <pre id="output">Click a button to see results...</pre>
</div>

<script>
function runQuery(type) {
  let result = "";

  if (type === "available") {
    result = `
TITLE                | CATEGORY     | AVAILABLE
------------------------------------------------
Clean Code           | Programming  | 3
Data Structures      | CS           | 2
`;
  }

  if (type === "borrowed") {
    result = `
MEMBER        | BOOK              | DUE DATE
---------------------------------------------
Alice         | Clean Code        | 2024-02-10
John          | Algorithms        | 2024-02-15
`;
  }

  if (type === "stats") {
    result = `
MONTH   | LOANS
----------------
Jan     | 5
Feb     | 8
Mar     | 3
`;
  }

  document.getElementById("output").textContent = result;
}
</script>

</body>
</html>
